name: Daily News Pipeline

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python fetch_news.py

      - name: Commit updated data
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@nawwp.com"
          git add archive.json news.json
          git commit -m "Automated news update" || echo "No changes"
          git push
