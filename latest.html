<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAWWP News Wire</title>
  <meta
    name="description"
    content="NAWWP News Wire: a satire-styled roundup of culture-war, education, religion, immigration, books, gender, DEI, and voting stories."
  />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a2f;
      --panel-2: #19233e;
      --border: #2a365a;
      --text: #eef3ff;
      --muted: #a8b5d6;
      --accent: #89b4ff;
      --accent-2: #c5d8ff;
      --chip: #223154;
      --chip-active: #3b5ea8;
      --score: #ffcf66;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(70, 98, 170, 0.18), transparent 35%),
        linear-gradient(180deg, #0a0f1d 0%, #0b1020 100%);
      color: var(--text);
    }

    a {
      color: var(--accent-2);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .hero {
      display: grid;
      gap: 14px;
      margin-bottom: 22px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(25, 35, 62, 0.96), rgba(16, 23, 42, 0.96));
      box-shadow: var(--shadow);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.02;
    }

    .subhead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      max-width: 900px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-btn {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .filter-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .filter-btn.active {
      background: var(--chip-active);
      border-color: var(--accent);
      color: #fff;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 15px;
    }

    .section {
      margin-top: 30px;
    }

    .section.hidden {
      display: none;
    }

    .section-header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 24px;
      color: var(--accent-2);
    }

    .section-count {
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(24, 34, 58, 0.96), rgba(15, 22, 40, 0.96));
      box-shadow: var(--shadow);
    }

    .card-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .topic-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(137, 180, 255, 0.12);
      border: 1px solid rgba(137, 180, 255, 0.26);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .score {
      color: var(--score);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .headline {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .headline a {
      color: var(--text);
    }

    .headline a:hover {
      color: var(--accent-2);
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .source-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 12px;
    }

    .footer-note {
      margin-top: 40px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .empty {
      padding: 28px 18px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 18px 12px 40px;
      }

      .hero {
        padding: 18px;
      }

      .headline {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">NAWWP News Wire</div>
      <h1>Outrage, backlash, and culture-war story sorting</h1>
      <p class="subhead">
        A topic-separated feed for satire-driven commentary around education, religion,
        immigration, books, gender, DEI, voting, and broader civic panic.
      </p>
    </header>

    <div class="topbar">
      <div class="filters" id="filters"></div>
      <div class="meta" id="meta">Loading...</div>
    </div>

    <div class="status" id="status"></div>
    <div id="content"></div>

    <div class="footer-note">
      Built from <code>news.json</code> with topic grouping from the pipeline.
    </div>
  </div>

  <script>
    const TOPIC_CONFIG = [
      { slug: "all", label: "All" },
      { slug: "education", label: "Education" },
      { slug: "religion-church-state", label: "Religion" },
      { slug: "immigration-identity", label: "Immigration" },
      { slug: "books-libraries-curriculum", label: "Books" },
      { slug: "gender-lgbtq", label: "Gender" },
      { slug: "dei-diversity-backlash", label: "DEI" },
      { slug: "voting-civic-panic", label: "Voting" },
      { slug: "general-culture-war", label: "General" }
    ];

    let currentFilter = "all";
    let articles = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(dateString) {
      if (!dateString) return "Unknown date";
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function getTopicLabel(slug, fallbackTopic = "") {
      const found = TOPIC_CONFIG.find(item => item.slug === slug);
      if (found) return found.label;
      return fallbackTopic || "General";
    }

    function normalizeArticle(article) {
      const topic = article.topic || "General Culture War";
      const sectionSlug = article.section_slug || "general-culture-war";
      const topicTags = Array.isArray(article.topic_tags) ? article.topic_tags : [];
      const tags = Array.isArray(article.tags) ? article.tags : [];

      return {
        title: article.title || "Untitled",
        source: article.source || "Unknown source",
        published_at: article.published_at || "",
        url: article.url || "#",
        summary: article.summary || "",
        score: Number(article.score || 0),
        pipeline_score: Number(article.pipeline_score || 0),
        topic,
        section_slug: sectionSlug,
        topic_tags,
        tags
      };
    }

    function buildFilterButtons() {
      const filtersEl = document.getElementById("filters");
      filtersEl.innerHTML = "";

      for (const item of TOPIC_CONFIG) {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (item.slug === currentFilter ? " active" : "");
        btn.textContent = item.label;
        btn.type = "button";
        btn.addEventListener("click", () => {
          currentFilter = item.slug;
          buildFilterButtons();
          renderArticles();
        });
        filtersEl.appendChild(btn);
      }
    }

    function buildCard(article) {
      const allTags = [...article.topic_tags, ...article.tags]
        .filter(Boolean)
        .map(tag => String(tag).trim())
        .filter((tag, index, arr) => arr.indexOf(tag) === index)
        .slice(0, 8);

      return `
        <article class="card">
          <div class="card-top">
            <div class="topic-pill">${escapeHtml(getTopicLabel(article.section_slug, article.topic))}</div>
            <div class="score">Score: ${escapeHtml(article.score.toFixed(1))}</div>
          </div>

          <h3 class="headline">
            <a href="${escapeHtml(article.url)}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(article.title)}
            </a>
          </h3>

          <p class="summary">${escapeHtml(article.summary)}</p>

          <div class="source-row">
            <span><strong>Source:</strong> ${escapeHtml(article.source)}</span>
            <span><strong>Published:</strong> ${escapeHtml(formatDate(article.published_at))}</span>
          </div>

          ${
            allTags.length
              ? `<div class="tags">${allTags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>`
              : ""
          }
        </article>
      `;
    }

    function renderArticles() {
      const contentEl = document.getElementById("content");
      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");

      if (!Array.isArray(articles) || articles.length === 0) {
        contentEl.innerHTML = `<div class="empty">No articles available yet.</div>`;
        statusEl.textContent = "";
        metaEl.textContent = "0 articles";
        return;
      }

      const normalized = articles.map(normalizeArticle);

      const visibleArticles =
        currentFilter === "all"
          ? normalized
          : normalized.filter(article => article.section_slug === currentFilter);

      metaEl.textContent = `${normalized.length} article${normalized.length === 1 ? "" : "s"} loaded`;
      statusEl.textContent =
        currentFilter === "all"
          ? `Showing all topics`
          : `Showing ${getTopicLabel(currentFilter)} only`;

      if (visibleArticles.length === 0) {
        contentEl.innerHTML = `<div class="empty">No articles matched this topic.</div>`;
        return;
      }

      if (currentFilter !== "all") {
        const sectionLabel = getTopicLabel(currentFilter);
        contentEl.innerHTML = `
          <section class="section">
            <div class="section-header">
              <h2 class="section-title">${escapeHtml(sectionLabel)}</h2>
              <div class="section-count">${visibleArticles.length} article${visibleArticles.length === 1 ? "" : "s"}</div>
            </div>
            <div class="grid">
              ${visibleArticles.map(buildCard).join("")}
            </div>
          </section>
        `;
        return;
      }

      const sections = TOPIC_CONFIG
        .filter(item => item.slug !== "all")
        .map(item => {
          const items = visibleArticles.filter(article => article.section_slug === item.slug);
          return { ...item, items };
        })
        .filter(section => section.items.length > 0);

      contentEl.innerHTML = sections.map(section => `
        <section class="section">
          <div class="section-header">
            <h2 class="section-title">${escapeHtml(section.label)}</h2>
            <div class="section-count">${section.items.length} article${section.items.length === 1 ? "" : "s"}</div>
          </div>
          <div class="grid">
            ${section.items.map(buildCard).join("")}
          </div>
        </section>
      `).join("");
    }

    async function loadNews() {
      const contentEl = document.getElementById("content");
      const statusEl = document.getElementById("status");
      const metaEl = document.getElementById("meta");

      try {
        const response = await fetch("news.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Failed to load news.json (${response.status})`);
        }

        const data = await response.json();
        articles = Array.isArray(data) ? data : [];

        articles.sort((a, b) => {
          const scoreDiff = Number(b.score || 0) - Number(a.score || 0);
          if (scoreDiff !== 0) return scoreDiff;

          const dateA = new Date(a.published_at || 0).getTime();
          const dateB = new Date(b.published_at || 0).getTime();
          return dateB - dateA;
        });

        buildFilterButtons();
        renderArticles();
      } catch (error) {
        console.error(error);
        metaEl.textContent = "Load failed";
        statusEl.textContent = "";
        contentEl.innerHTML = `
          <div class="empty">
            Could not load <code>news.json</code>.<br><br>
            Make sure the file exists in the same directory as this HTML page.
          </div>
        `;
      }
    }

    buildFilterButtons();
    loadNews();
  </script>
</body>
</html>
